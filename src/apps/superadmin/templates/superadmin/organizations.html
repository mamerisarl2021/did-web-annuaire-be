{% extends "base_superadmin.html" %}
{% block title %}Organizations{% endblock %}

{% block content %}
    <div class="sa-page-header">
        <div>
            <h2>Organizations</h2>
            <p>Review and manage registered organizations</p>
        </div>
    </div>

    <div id="alert-box"></div>

    <!-- Toolbar -->
    <div class="sa-toolbar" style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
        <input type="text" id="org-search" placeholder="Search organizations..." class="sa-input"
               oninput="handleSearch(this.value)"
               style="max-width: 300px; padding: 0.5rem; border: 1px solid var(--sa-border); border-radius: 4px;">
    </div>

    <!-- Status tabs -->
    <div class="sa-tabs" id="status-tabs">
        <button class="sa-tab active" data-status="" onclick="switchTab(this)">
            All <span class="count" id="count-all">—</span>
        </button>
        <button class="sa-tab" data-status="PENDING_REVIEW" onclick="switchTab(this)">
            Pending <span class="count" id="count-pending">—</span>
        </button>
        <button class="sa-tab" data-status="APPROVED" onclick="switchTab(this)">
            Approved <span class="count" id="count-approved">—</span>
        </button>
        <button class="sa-tab" data-status="REJECTED" onclick="switchTab(this)">
            Rejected <span class="count" id="count-rejected">—</span>
        </button>
        <button class="sa-tab" data-status="SUSPENDED" onclick="switchTab(this)">
            Suspended <span class="count" id="count-suspended">—</span>
        </button>
    </div>

    <div id="org-table">
        <div class="sa-empty"><p>Loading...</p></div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        let allOrgs = [];
        let currentStatus = "";
        let searchQuery = "";
        let sortKey = "created_at";
        let sortOrder = -1; // -1 for desc, 1 for asc

        // Check for URL query param
        const urlParams = new URLSearchParams(window.location.search);
        const initialStatus = urlParams.get("status") || "";

        async function loadOrgs() {
            try {
                allOrgs = await SA.listOrgs();
                updateCounts();

                if (initialStatus) {
                    currentStatus = initialStatus;
                    document.querySelectorAll(".sa-tab").forEach(t => {
                        t.classList.toggle("active", t.dataset.status === initialStatus);
                    });
                }

                renderTable();
            } catch (err) {
                saShowAlert("alert-box", err.detail || "Failed to load organizations.", "error");
            }
        }

        function updateCounts() {
            document.getElementById("count-all").textContent = allOrgs.length;
            document.getElementById("count-pending").textContent = allOrgs.filter(o => o.status === "PENDING_REVIEW").length;
            document.getElementById("count-approved").textContent = allOrgs.filter(o => o.status === "APPROVED").length;
            document.getElementById("count-rejected").textContent = allOrgs.filter(o => o.status === "REJECTED").length;
            document.getElementById("count-suspended").textContent = allOrgs.filter(o => o.status === "SUSPENDED").length;
        }

        function switchTab(tab) {
            currentStatus = tab.dataset.status;
            document.querySelectorAll(".sa-tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            renderTable();
        }

        function handleSearch(query) {
            searchQuery = query.toLowerCase();
            renderTable();
        }

        function setSort(key) {
            if (sortKey === key) {
                sortOrder = sortOrder * -1;
            } else {
                sortKey = key;
                sortOrder = 1; // default asc for new key
            }
            renderTable();
        }

        function renderTable() {
            let filtered = currentStatus ? allOrgs.filter(o => o.status === currentStatus) : allOrgs;

            if (searchQuery) {
                filtered = filtered.filter(o =>
                    (o.name || "").toLowerCase().includes(searchQuery) ||
                    (o.slug || "").toLowerCase().includes(searchQuery) ||
                    (o.admin_email || "").toLowerCase().includes(searchQuery)
                );
            }

            filtered.sort((a, b) => {
                let valA = a[sortKey] || "";
                let valB = b[sortKey] || "";
                if (typeof valA === "string") valA = valA.toLowerCase();
                if (typeof valB === "string") valB = valB.toLowerCase();

                if (valA < valB) return -1 * sortOrder;
                if (valA > valB) return 1 * sortOrder;
                return 0;
            });

            if (filtered.length === 0) {
                document.getElementById("org-table").innerHTML = `
      <div class="sa-empty">
        <div class="icon">🏢</div>
        <p>No organizations ${currentStatus ? "with status " + currentStatus.toLowerCase().replace("_", " ") : "found"}</p>
      </div>`;
                return;
            }

            const rows = filtered.map(org => {
                let actions = "";
                if (org.status === "PENDING_REVIEW") {
                    actions += `<button class="sa-btn sa-btn-sm" style="background-color: var(--sa-green); color: white; padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="handleAccept(event, '${org.id}')">Accept</button> \n`;
                    actions += `<button class="sa-btn sa-btn-sm" style="background-color: #fca5a5; color: #7f1d1d; padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="handleReject(event, '${org.id}')">Reject</button> \n`;
                }
                if (org.status === "APPROVED") {
                    actions += `<button class="sa-btn sa-btn-sm sa-btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; margin-right: 4px;" onclick="handleSuspend(event, '${org.id}')">Suspend</button> \n`;
                }
                if (org.status === "SUSPENDED") {
                    actions += `<button class="sa-btn sa-btn-sm" style="background-color: var(--sa-primary); color: white; padding: 0.25rem 0.5rem; font-size: 0.75rem; margin-right: 4px;" onclick="handleReactivate(event, '${org.id}')">Reactivate</button> \n`;
                }
                actions += `<button class="sa-btn sa-btn-sm sa-btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;" onclick="handleDelete(event, '${org.id}')">Delete</button>`;

                return `
      <tr style="cursor:pointer;" onclick="window.location.href='{% url 'superadmin:sa_organizations' %}${org.id}/'">
        <td>
          <div class="org-name">${org.name}</div>
          <div class="org-slug">${org.slug}</div>
        </td>
        <td>${org.type || "—"}</td>
        <td>${org.country || "—"}</td>
        <td>${org.admin_email || "—"}</td>
        <td><span class="sa-badge ${badgeClass(org.status)}">${badgeLabel(org.status)}</span></td>
        <td>${formatDate(org.created_at)}</td>
        <td onclick="event.stopPropagation()">${actions}</td>
      </tr>
    `
            }).join("");

            document.getElementById("org-table").innerHTML = `
    <div class="sa-table-wrap">
      <table class="sa-table">
        <thead><tr>
          <th style="cursor:pointer" onclick="setSort('name')">Organization ${sortKey === 'name' ? (sortOrder === 1 ? '▲' : '▼') : ''}</th>
          <th style="cursor:pointer" onclick="setSort('type')">Type ${sortKey === 'type' ? (sortOrder === 1 ? '▲' : '▼') : ''}</th>
          <th style="cursor:pointer" onclick="setSort('country')">Country ${sortKey === 'country' ? (sortOrder === 1 ? '▲' : '▼') : ''}</th>
          <th style="cursor:pointer" onclick="setSort('admin_email')">Admin ${sortKey === 'admin_email' ? (sortOrder === 1 ? '▲' : '▼') : ''}</th>
          <th style="cursor:pointer" onclick="setSort('status')">Status ${sortKey === 'status' ? (sortOrder === 1 ? '▲' : '▼') : ''}</th>
          <th style="cursor:pointer" onclick="setSort('created_at')">Submitted ${sortKey === 'created_at' ? (sortOrder === 1 ? '▲' : '▼') : ''}</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
        }

        async function handleAccept(e, orgId) {
            e.stopPropagation();
            if (!confirm("Are you sure you want to approve this organization?")) return;
            try {
                await SA.approveOrg(orgId);
                saShowAlert("alert-box", "Organization approved.", "success");
                loadOrgs();
            } catch (err) {
                saShowAlert("alert-box", err.detail || "Error approving organization", "error");
            }
        }

        async function handleReject(e, orgId) {
            e.stopPropagation();
            const reason = prompt("Enter rejection reason:");
            if (reason === null) return;
            try {
                await SA.rejectOrg(orgId, reason);
                saShowAlert("alert-box", "Organization rejected.", "success");
                loadOrgs();
            } catch (err) {
                saShowAlert("alert-box", err.detail || "Error rejecting organization", "error");
            }
        }

        async function handleSuspend(e, orgId) {
            e.stopPropagation();
            const reason = prompt("Enter suspension reason (optional):");
            if (reason === null) return;
            try {
                await SA.suspendOrg(orgId, reason);
                saShowAlert("alert-box", "Organization suspended.", "success");
                loadOrgs();
            } catch (err) {
                saShowAlert("alert-box", err.detail || "Error suspending organization", "error");
            }
        }

        async function handleReactivate(e, orgId) {
            e.stopPropagation();
            if (!confirm("Are you sure you want to reactivate this organization?")) return;
            try {
                await SA.reactivateOrg(orgId);
                saShowAlert("alert-box", "Organization reactivated.", "success");
                loadOrgs();
            } catch (err) {
                saShowAlert("alert-box", err.detail || "Error reactivating organization", "error");
            }
        }

        async function handleDelete(e, orgId) {
            e.stopPropagation();
            if (!confirm("WARNING: This will permanently delete the organization! Are you sure?")) return;
            try {
                await SA.deleteOrg(orgId);
                saShowAlert("alert-box", "Organization deleted.", "success");
                loadOrgs();
            } catch (err) {
                saShowAlert("alert-box", err.detail || "Error deleting organization", "error");
            }
        }

        loadOrgs();
    </script>
{% endblock %}
