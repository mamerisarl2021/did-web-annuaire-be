{% extends "base_orgadmin.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
    <div class="oa-page-header">
        <div>
            <h2 id="settings-title">Settings</h2>
            <p id="settings-subtitle">Loading...</p>
        </div>
    </div>

    <div id="alert-box"></div>

    <div class="oa-detail-grid" id="settings-content">
        <div class="oa-empty" style="grid-column:1/-1;"><p>Loading...</p></div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        const org = getCurrentOrg();
        if (!org) window.location.href = "/login/";

        // Wait for sidebar initSidebar to resolve window.currentOrgRole
        const getRole = () => new Promise(resolve => {
            const check = () => {
                if (window.currentOrgRole !== null && window.currentOrgRole !== undefined) {
                    resolve(window.currentOrgRole);
                } else {
                    setTimeout(check, 50);
                }
            };
            check();
        });

        (async function loadSettings() {
            try {
                const role = await getRole();
                const isAdmin = role === "ORG_ADMIN";

                if (isAdmin) {
                    document.getElementById("settings-subtitle").textContent = "View and manage your organization details";
                    await loadAdminSettings();
                } else {
                    document.getElementById("settings-title").textContent = "My Settings";
                    document.getElementById("settings-subtitle").textContent = "Manage your personal information";
                    await loadMemberSettings();
                }
            } catch (err) {
                oaAlert("alert-box", err.detail || "Failed to load settings.", "error");
            }
        })();

        // ── ORG_ADMIN settings (unchanged) ─────────────────────────────────────
        async function loadAdminSettings() {
            const [user, detail] = await Promise.all([
                Auth.me(),
                OA.getOrg(org.id)
            ]);

            document.getElementById("settings-content").innerHTML = `
      <!-- Left: org info -->
      <div class="oa-card">
        <h3>Organization Information</h3>
        
        <div id="org-settings-alert"></div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Name</label>
          <input id="org-name" type="text" value="${escapeHtml(detail.name || "")}" class="oa-input">
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Type</label>
          <select id="org-type" class="oa-select">
            <option value="enterprise" ${detail.type === 'enterprise' ? 'selected' : ''}>Enterprise</option>
            <option value="government" ${detail.type === 'government' ? 'selected' : ''}>Government / Public Sector</option>
            <option value="ngo" ${detail.type === 'ngo' ? 'selected' : ''}>Non-Governmental Organization (NGO)</option>
            <option value="academic" ${detail.type === 'academic' ? 'selected' : ''}>Academic Institution</option>
          </select>
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Email</label>
          <input id="org-email" type="email" value="${escapeHtml(detail.email || "")}" class="oa-input">
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Country</label>
          <input id="org-country" type="text" value="${escapeHtml(detail.country || "")}" class="oa-input">
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Address</label>
          <input id="org-address" type="text" value="${escapeHtml(detail.address || "")}" class="oa-input">
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Description</label>
          <textarea id="org-description" class="oa-input" style="resize:vertical;min-height:80px;">${escapeHtml(detail.description || "")}</textarea>
        </div>

        <div style="margin-top:1.5rem;">
          <button id="org-save-btn" onclick="saveOrgSettings()" class="oa-btn oa-btn-primary">
            Update Organization
          </button>
        </div>
      </div>

      <!-- Right: stats and personal info -->
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div class="oa-card">
          <h3>Statistics</h3>
          ${field("Members", detail.member_count)}
          ${field("DID Documents", detail.document_count)}
          ${field("Certificates", detail.certificate_count)}
        </div>

        <div class="oa-card">
          <h3>Personal Information</h3>
          <p style="font-size:0.8125rem;color:var(--oa-text-light);margin-bottom:1rem;">
            Update your name and phone number.
          </p>

          <div id="profile-alert"></div>

          <div class="oa-field" style="flex-direction:column;gap:0.25rem;">
            <label for="profile-full-name" style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Full Name</label>
            <input id="profile-full-name" type="text" value="${escapeHtml(user.full_name || "")}" class="oa-input">
          </div>

          <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
            <label for="profile-phone" style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Phone</label>
            <input id="profile-phone" type="tel" value="${escapeHtml(user.phone || "")}" class="oa-input">
          </div>

          <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
            <label for="profile-email" style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Email</label>
            <input id="profile-email" type="email" value="${escapeHtml(user.email)}" class="oa-input">
          </div>

          <div style="margin-top:1.5rem;">
            <button id="profile-save-btn" onclick="saveProfile()" class="oa-btn oa-btn-primary">
              Save Changes
            </button>
          </div>
        </div>
      </div>
    `;
        }

        // ── ORG_MEMBER settings ─────────────────────────────────────────────────
        async function loadMemberSettings() {
            const [user, stats, orgDetail] = await Promise.all([
                Auth.me(),
                OA.getStats(org.id, "me"),
                OA.getOrg(org.id),
            ]);

            document.getElementById("settings-content").innerHTML = `
      <!-- Left: personal info form -->
      <div class="oa-card">
        <h3>Personal Information</h3>
        <p style="font-size:0.8125rem;color:var(--oa-text-light);margin-bottom:1rem;">
          Update your name and phone number. Your job function is managed by your organization admin.
        </p>

        <div id="profile-alert"></div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;">
          <label for="profile-full-name" style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Full Name</label>
          <input id="profile-full-name" type="text" value="${escapeHtml(user.full_name || "")}"
                 style="padding:0.5rem 0.75rem;border:1px solid var(--oa-border);border-radius:6px;font-size:0.9375rem;background:var(--oa-bg);color:var(--oa-text);width:100%;box-sizing:border-box;">
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label for="profile-phone" style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Phone</label>
          <input id="profile-phone" type="tel" value="${escapeHtml(user.phone || "")}"
                 style="padding:0.5rem 0.75rem;border:1px solid var(--oa-border);border-radius:6px;font-size:0.9375rem;background:var(--oa-bg);color:var(--oa-text);width:100%;box-sizing:border-box;">
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Function / Job Title</label>
          <div style="padding:0.5rem 0.75rem;border:1px solid var(--oa-border);border-radius:6px;font-size:0.9375rem;background:var(--oa-surface);color:var(--oa-text-muted);">
            ${escapeHtml(user.functions || "—")}
          </div>
          <span style="font-size:0.75rem;color:var(--oa-text-light);">Set by your organization admin.</span>
        </div>

        <div class="oa-field" style="flex-direction:column;gap:0.25rem;margin-top:1rem;">
          <label for="profile-email" style="font-size:0.8125rem;font-weight:600;color:var(--oa-text-muted);">Email</label>
          <input id="profile-email" type="email" value="${escapeHtml(user.email)}" class="oa-input">
        </div>

        <div style="margin-top:1.5rem;">
          <button id="profile-save-btn" onclick="saveProfile()"
                  style="padding:0.5rem 1.25rem;background:var(--oa-accent);color:#fff;border:none;border-radius:6px;font-size:0.9375rem;font-weight:600;cursor:pointer;">
            Save Changes
          </button>
        </div>
      </div>

      <!-- Right: per-user stats -->
      <div>
        <div class="oa-card" style="margin-bottom:1.5rem;">
          <h3>Statistics</h3>
          ${field("My DID Documents", stats.total_documents)}
          ${field("My Certificates", stats.total_certificates)}
        </div>
      </div>
    `;
        }

        async function saveProfile() {
            const btn = document.getElementById("profile-save-btn");
            const fullName = document.getElementById("profile-full-name").value.trim();
            const phone = document.getElementById("profile-phone").value.trim();
            const email = document.getElementById("profile-email").value.trim();

            if (!fullName) {
                oaAlert("profile-alert", "Full name cannot be empty.", "error");
                return;
            }
            if (!email) {
                oaAlert("profile-alert", "Email cannot be empty.", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Saving…";
            oaClearAlert("profile-alert");

            try {
                await oaUpdateMe({ full_name: fullName, phone, email });
                oaAlert("profile-alert", "Profile updated successfully.", "success");
                // Update sidebar display name
                const nameEl = document.getElementById("sidebar-user-name");
                if (nameEl) nameEl.textContent = fullName;
            } catch (err) {
                oaAlert("profile-alert", err.detail || "Failed to save profile.", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Save Changes";
            }
        }

        async function saveOrgSettings() {
            const btn = document.getElementById("org-save-btn");
            const name = document.getElementById("org-name").value.trim();
            const type = document.getElementById("org-type").value;
            const email = document.getElementById("org-email").value.trim();
            const country = document.getElementById("org-country").value.trim();
            const address = document.getElementById("org-address").value.trim();
            const description = document.getElementById("org-description").value.trim();

            if (!name) {
                oaAlert("org-settings-alert", "Organization name cannot be empty.", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Updating...";
            oaClearAlert("org-settings-alert");

            try {
                const payload = {
                    name,
                    type,
                    email,
                    country,
                    address,
                    description,
                };
                await OA.updateOrg(org.id, payload);
                oaAlert("org-settings-alert", "Organization settings updated successfully.", "success");
                document.getElementById("sidebar-org-name").textContent = name;
            } catch (err) {
                oaAlert("org-settings-alert", err.detail || "Failed to update organization.", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Update Organization";
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function field(label, value, mono = false) {
            const cls = !value && value !== 0 ? "value empty" : (mono ? "value mono" : "value");
            const display = value === 0 ? "0" : (value || "—");
            return `<div class="oa-field"><div class="label">${label}</div><div class="${cls}">${display}</div></div>`;
        }
    </script>
{% endblock %}
