{% extends "base_orgadmin.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
    <div class="oa-page-header">
        <div>
            <h2>Dashboard</h2>
            <p id="dashboard-subtitle">Loading...</p>
        </div>
    </div>

    <div id="alert-box"></div>

    <!-- Stats -->
    <div class="oa-stats" id="stats-grid">
        <div class="oa-stat">
            <div class="label">Loading...</div>
            <div class="value">—</div>
        </div>
    </div>

    <!-- Quick actions -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1rem;margin-bottom:2rem;"
         id="quick-actions">
    </div>

    <!-- Recent members (ORG_ADMIN only) -->
    <div id="recent-members"></div>
{% endblock %}

{% block scripts %}
    <script>
        (async function loadDashboard() {
            const org = getCurrentOrg();
            if (!org) {
                oaAlert("alert-box", "No organization found. Please contact support.");
                return;
            }

            // Wait for sidebar to resolve the role (set by base_orgadmin initSidebar)
            const getRole = () => new Promise(resolve => {
                const check = () => {
                    if (window.currentOrgRole !== null && window.currentOrgRole !== undefined) {
                        resolve(window.currentOrgRole);
                    } else {
                        setTimeout(check, 50);
                    }
                };
                check();
            });

            try {
                const role = await getRole();
                const isAdmin = role === "ORG_ADMIN";

                document.getElementById("dashboard-subtitle").textContent =
                    isAdmin ? "Organization overview" : "Your personal workspace";

                if (isAdmin) {
                    await loadAdminDashboard(org);
                } else {
                    await loadMemberDashboard(org);
                }
            } catch (err) {
                oaAlert("alert-box", err.detail || "Failed to load dashboard.", "error");
            }
        })();

        // ── ORG_ADMIN: full org overview ───────────────────────────────────────
        async function loadAdminDashboard(org) {
            const [stats, members] = await Promise.all([
                OA.getStats(org.id),
                OA.listMembers(org.id),
            ]);

            document.getElementById("stats-grid").innerHTML = `
      <div class="oa-stat">
        <div class="label">Active Members</div>
        <div class="value accent">${stats.active_members}</div>
      </div>
      <div class="oa-stat">
        <div class="label">Pending Invites</div>
        <div class="value warn">${stats.invited_members}</div>
      </div>
      <div class="oa-stat" style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="label">DID Documents</div>
          <div class="value">${stats.total_documents}</div>
        </div>
        <div style="text-align:right;font-size:0.8125rem;color:var(--oa-text-muted);display:flex;flex-direction:column;gap:0.25rem;">
          <div><span style="font-weight:600;color:var(--oa-text);">${stats.draft_documents}</span> Drafts</div>
          <div><span style="font-weight:600;color:var(--oa-text);">${stats.signed_documents}</span> Signed</div>
          <div><span style="font-weight:600;color:var(--oa-text);">${stats.published_documents}</span> Authored</div>
        </div>
      </div>
      <div class="oa-stat">
        <div class="label">Certificates</div>
        <div class="value">${stats.total_certificates}</div>
      </div>
    `;

            document.getElementById("quick-actions").innerHTML = `
      <a href="/workspace/members/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">👥</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">Manage Members</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">Invite, roles &amp; access</div>
      </a>
      <a href="/workspace/documents/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">📄</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">DID Documents</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">Create & manage DIDs</div>
      </a>
      <a href="/workspace/certificates/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">🔐</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">Certificates</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">Manage X.509 certs</div>
      </a>
      <a href="/workspace/settings/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">⚙️</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">Organization Settings</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">Details &amp; configuration</div>
      </a>
    `;

            const activeMembers = members.filter(m => m.status !== "DEACTIVATED").slice(0, 5);
            if (activeMembers.length > 0) {
                const rows = activeMembers.map(m => `
        <tr>
          <td>
            <div class="member-name">${m.full_name || "—"}</div>
            <div class="member-email">${m.email}</div>
          </td>
          <td>${roleBadge(m.role)}</td>
          <td>${statusBadge(m.status)}</td>
          <td>${oaFormatDate(m.created_at)}</td>
        </tr>
      `).join("");

                document.getElementById("recent-members").innerHTML = `
        <div class="oa-table-wrap">
          <div class="oa-table-header">
            <h3>Team Members</h3>
            <a href="/workspace/members/" class="oa-btn oa-btn-ghost oa-btn-sm">View all →</a>
          </div>
          <table class="oa-table">
            <thead><tr><th>Member</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
            }
        }

        // ── ORG_MEMBER: personal overview only ────────────────────────────────
        async function loadMemberDashboard(org) {
            const stats = await OA.getStats(org.id, "me");

            document.getElementById("stats-grid").innerHTML = `
      <div class="oa-stat" style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="label">My DID Documents</div>
          <div class="value">${stats.total_documents}</div>
        </div>
        <div style="text-align:right;font-size:0.8125rem;color:var(--oa-text-muted);display:flex;flex-direction:column;gap:0.25rem;">
          <div><span style="font-weight:600;color:var(--oa-text);">${stats.draft_documents}</span> Drafts</div>
          <div><span style="font-weight:600;color:var(--oa-text);">${stats.signed_documents}</span> Signed</div>
          <div><span style="font-weight:600;color:var(--oa-text);">${stats.published_documents}</span> Authored</div>
        </div>
      </div>
      <div class="oa-stat">
        <div class="label">My Certificates</div>
        <div class="value">${stats.total_certificates}</div>
      </div>
    `;

            document.getElementById("quick-actions").innerHTML = `
      <a href="/workspace/documents/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">📄</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">DID Documents</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">View & manage your DIDs</div>
      </a>
      <a href="/workspace/certificates/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">🔐</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">Certificates</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">View & manage your certs</div>
      </a>
      <a href="/workspace/settings/" class="oa-card" style="text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;"
         onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">⚙️</div>
        <div style="font-weight:600;font-size:0.9375rem;color:var(--oa-text);">My Settings</div>
        <div style="font-size:0.8125rem;color:var(--oa-text-muted);margin-top:0.25rem;">Update your profile</div>
      </a>
    `;
        }
    </script>
{% endblock %}
