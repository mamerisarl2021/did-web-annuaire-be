services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: annuaire-nginx
    restart: no
    ports:
      - "8086:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - dids_volume:/app/data/dids:ro
    depends_on:
      annuaire-backend:
        condition: service_healthy
    networks:
      - annuaire_staging_net

  # ── Django backend ────────────────────────────────────────────────────────
  annuaire-backend:
    build: .
    image: ctrldaviddee/annuaire_did_be:staging-prime-latest
    container_name: annuaire-backend
    restart: no
    env_file:
      - .env.backend
    volumes:
      - static_volume:/app/static_root
      - media_volume:/app/mediafiles
      - dids_volume:/app/data/dids
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    #healthcheck:
    #  test: ["CMD-SHELL", "curl -sf http://localhost:8899/api/health/ || exit 1"]
    #  interval: 15s
    #  timeout: 5s
    #  retries: 5
    #  start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - annuaire_net

  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:18
    container_name: annuaire-db
    restart: no
    env_file:
      - .env.backend
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-annuaire_did}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - annuaire_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:8.4.1-alpine
    container_name: annuaire-redis
    restart: no
    env_file:
      - .env.backend
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redisallow-alex@123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - annuaire_net

  # ── Celery worker ─────────────────────────────────────────────────────────
  celery:
    image: ctrldaviddee/annuaire_did_be:staging-prime-latest
    container_name: annuaire-celery
    restart: no
    command: celery -A src.config.celery_app worker -l info --without-gossip --without-mingle --without-heartbeat
    env_file:
      - .env.backend
    volumes:
      - media_volume:/app/mediafiles
    depends_on:
      #annuaire-backend:
      #  condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "170m"
        max-file: "5"
    networks:
      - annuaire_net

  # ── Celery beat scheduler ─────────────────────────────────────────────────
  celery-beat:
    image: ctrldaviddee/annuaire_did_be:staging-prime-latest
    container_name: annuaire-celery-beat
    restart: unless-stopped
    command: celery -A src.config.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.backend
    volumes:
      - media_volume:/app/mediafiles
    depends_on:
      #annuaire-backend:
      #  condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "170m"
        max-file: "5"
    networks:
      - annuaire_net

# ═════════════════════════════════════════════════════════════════════════════
#  DIF UNIVERSAL RESOLVER
# ═════════════════════════════════════════════════════════════════════════════

  uni-resolver-web:
    image: universalresolver/uni-resolver-web:latest
    container_name: uni-resolver-web
    restart: unless-stopped
    #ports:
    #  - "8080:8080"
    volumes:
      - ./application-uniresolver.yml:/opt/uni-resolver-java/uni-resolver-web/application.yml:ro
    networks:
      - annuaire_staging_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # did:web + did:ethr + did:ens + did:peer (uPort/Veramo driver)
  uni-resolver-driver-did-uport:
    image: uport/uni-resolver-driver-did-uport:5.0.3
    container_name: uni-resolver-driver-did-uport
    restart: unless-stopped
    networks:
      - annuaire_staging_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ═════════════════════════════════════════════════════════════════════════════
#  DIF UNIVERSAL REGISTRAR
# ═════════════════════════════════════════════════════════════════════════════

  uni-registrar-web:
    image: universalregistrar/uni-registrar-web:latest
    container_name: uni-registrar-web
    restart: unless-stopped
    #ports:
    #  - "9080:9080"
    volumes:
      - ./application-uniregistrar.yml:/opt/uni-registrar-java/uni-registrar-web/application.yml:ro
    networks:
      - annuaire_staging_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # did:web driver — writes DID docs to the shared volume
  driver-did-web:
    image: universalregistrar/driver-did-web:latest
    container_name: uni-registrar-driver-did-web
    restart: unless-stopped
    environment:
      uniregistrar_driver_did_web_basePath: /app/data/dids
      uniregistrar_driver_did_web_baseUrl: https://annuairedid-be.qcdigitalhub.com
      uniregistrar_driver_did_web_generatedFolder: /generated
    volumes:
      - dids_volume:/app/data/dids
    networks:
      - annuaire_staging_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  dids_volume:

networks:
  annuaire_staging_net:
    external: true