events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    etag on;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ── Docker DNS resolver ─────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name annuairedid-be.qcdigitalhub.com;

        # ── Static files ────────────────────────────────────────────────────
        # WhiteNoise now serves static files directly from Django/Gunicorn.
        # This nginx location acts as an OPTIONAL cache layer.
        # If the volume is empty or misconfigured, Django handles it.
        location /static/ {
            alias /static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri @django;
        }

        location /media/ {
            alias /media/;
            expires 7d;
            try_files $uri @django;
        }

        # ════════════════════════════════════════════════════════════════════
        #  DID Document resolution (did:web spec)
        # ════════════════════════════════════════════════════════════════════

        # Personal DID: /{org}/{user}/{label}/did.json
        location ~ ^/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/did\.json$ {
            root /app/data/dids;
            try_files $uri =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=300";
            limit_except GET HEAD { deny all; }
        }

        # Organization-scope DID: /{org}/{label}/did.json
        location ~ ^/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/did\.json$ {
            root /app/data/dids;
            try_files $uri =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=300";
            limit_except GET HEAD { deny all; }
        }

        # Platform root DID: /.well-known/did.json
        location = /.well-known/did.json {
            root /app/data/dids;
            try_files /.well-known/did.json =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Cache-Control "public, max-age=300";
        }

        # ════════════════════════════════════════════════════════════════════
        #  Universal Resolver  →  /resolver/…
        # ════════════════════════════════════════════════════════════════════
        location /resolver/ {
            set $resolver_backend http://uni-resolver-web:8080;

            rewrite ^/resolver(/.*)$ $1 break;

            proxy_pass $resolver_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ════════════════════════════════════════════════════════════════════
        #  Universal Registrar  →  /registrar/…
        # ════════════════════════════════════════════════════════════════════
        location /registrar/ {
            set $registrar_backend http://uni-registrar-web:9080;

            rewrite ^/registrar(/.*)$ $1 break;

            proxy_pass $registrar_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ════════════════════════════════════════════════════════════════════
        #  SignServer CE — HTTP process/healthcheck API only
        #
        #  IMPORTANT: The Admin Web (/signserver/adminweb/) requires
        #  mTLS client certificate authentication. It CANNOT work through
        #  an HTTP reverse proxy because the TLS handshake (where the
        #  browser presents its client cert) is terminated by nginx.
        #
        #  Admin Web access: connect directly to SignServer's HTTPS port:
        #    https://<server-ip>:8443/signserver/adminweb/
        #
        #  This proxy block handles ONLY the HTTP API endpoints used by
        #  the backend (process, healthcheck).
        # ════════════════════════════════════════════════════════════════════
        location /signserver/process {
            set $signserver_backend http://signserver-node:8080;

            proxy_pass $signserver_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        location /signserver/healthcheck {
            set $signserver_backend http://signserver-node:8080;

            proxy_pass $signserver_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Block admin web through nginx — must use direct HTTPS:8443
        location /signserver/adminweb {
            return 302 http://$host:8443/signserver/adminweb/;
        }

        # Other signserver resources (CSS, JS for error pages etc.)
        location /signserver/ {
            set $signserver_backend http://signserver-node:8080;

            proxy_pass $signserver_backend/signserver/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ════════════════════════════════════════════════════════════════════
        #  EJBCA  →  /ejbca/…
        # ════════════════════════════════════════════════════════════════════
        location /ejbca/ {
            set $ejbca_backend https://ejbca-node1:8443;

            proxy_pass         $ejbca_backend/ejbca/;
            proxy_ssl_verify   off;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering       off;
            proxy_request_buffering off;
        }

        # ════════════════════════════════════════════════════════════════════
        #  Django backend — named location for try_files fallback
        # ════════════════════════════════════════════════════════════════════
        location @django {
            set $django http://annuaire-backend:8899;
            proxy_pass $django;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ════════════════════════════════════════════════════════════════════
        #  Django backend — explicit routes
        # ════════════════════════════════════════════════════════════════════
        location /orbit/ {
            set $django http://annuaire-backend:8899;
            proxy_pass $django;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $django http://annuaire-backend:8899;
            proxy_pass $django;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            set $django http://annuaire-backend:8899;
            proxy_pass $django;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch-all → Django (handles /login/, /resolve/, /search/, etc.)
        location / {
            set $django http://annuaire-backend:8899;
            proxy_pass $django;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        client_max_body_size 100m;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   application/wasm image/svg+xml application/did+json
                   application/ld+json;
    }
}