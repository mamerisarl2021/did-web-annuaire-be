events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    etag on;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Upstreams
    upstream annuaire_backend { server annuaire-backend:8899; }
    upstream uni_resolver     { server uni-resolver-web:8080;  }
    upstream uni_registrar    { server uni-registrar-web:9080; }

    server {
        listen 80;
        http2 on;
        server_name annuairedid-be.qcdigitalhub.com;

        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Static files
        location /static/ { alias /static/; expires 7d; }
        location /media/  { alias /media/;  expires 7d; }


        location ~ ^/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/did\.json$ {
            root /app/data/dids;
            try_files $uri =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=300";
            limit_except GET HEAD { deny all; }
        }

        location = /.well-known/did.json {
            root /app/data/dids;
            try_files /.well-known/did.json =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=300";
        }

        # Universal Resolver
        location /resolver/ {
            rewrite ^/resolver(/.*)$ $1 break;
            proxy_pass http://uni_resolver;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # Universal Registrar
        location /registrar/ {
            rewrite ^/registrar(/.*)$ $1 break;
            proxy_pass http://uni_registrar;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }


        # Django backend
        location /api/ {
            proxy_pass http://annuaire_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /admin/ {
            proxy_pass http://annuaire_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            proxy_pass http://annuaire_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        client_max_body_size 100m;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   application/wasm image/svg+xml application/did+json
                   application/ld+json;
    }
}