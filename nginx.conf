events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    etag on;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ── Upstreams ───────────────────────────────────────────────────────────

    upstream annuaire_backend { server annuaire-backend:8899; }
    upstream uni_resolver     { server uni-resolver-web:8080; }
    upstream uni_registrar    { server uni-registrar-web:9080; }

    server {
        listen 443 ssl;
        http2 on;
        server_name localhost annuairedid-be.qcdigitalhub.com;

        # ── TLS configuration ───────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/nginx-ec.key;

        # Modern & secure settings (2025/2026 standards)
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Static files ────────────────────────────────────────────────────
        location /static/ { alias /static/; expires 7d; }
        location /media/  { alias /media/;  expires 7d; }

        # ════════════════════════════════════════════════════════════════════
        #  DID Document resolution (did:web spec)
        #
        #  did:web:<host>:<org>:<user>:<label>
        #    resolves → GET https://<host>/<org>/<user>/<label>/did.json
        #    file on disk → /app/data/dids/<org>/<user>/<label>/did.json
        #
        #  root = /app/data/dids  ⇒  nginx serves  root + URI  =
        #    /app/data/dids/<org>/<user>/<label>/did.json
        # ════════════════════════════════════════════════════════════════════

        # Personal DID: /{org}/{user}/{label}/did.json  (3 path segments)
        location ~ ^/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/([a-zA-Z0-9._-]+)/did\.json$ {
            root /app/data/dids;
            try_files $uri =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=300";
            limit_except GET HEAD { deny all; }
        }

        # Platform root DID: did:web:<domain>
        # Resolves → GET /.well-known/did.json
        location = /.well-known/did.json {
            root /app/data/dids;
            try_files /.well-known/did.json =404;
            default_type application/did+json;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "public, max-age=300";
        }

        # ════════════════════════════════════════════════════════════════════
        #  Universal Resolver  →  /resolver/…
        #  Example: GET /resolver/1.0/identifiers/did:web:example.com
        # ════════════════════════════════════════════════════════════════════
        location /resolver/ {
            rewrite ^/resolver(/.*)$ $1 break;

            proxy_pass http://uni_resolver;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ════════════════════════════════════════════════════════════════════
        #  Universal Registrar  →  /registrar/…
        #  Example: POST /registrar/1.0/create
        # ════════════════════════════════════════════════════════════════════
        location /registrar/ {
            rewrite ^/registrar(/.*)$ $1 break;

            proxy_pass http://uni_registrar;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ════════════════════════════════════════════════════════════════════
        #  SignServer CE  →  /signserver/…
        #
        #  Proxies to SignServer's HTTPS port (8443) with SSL verify off.
        #  For local dev, mutual TLS headers are omitted — use ALLOW_ANY=true
        #  on the SignServer container, or access the admin UI directly at
        #  https://localhost:8443/signserver/
        # ════════════════════════════════════════════════════════════════════
        location /signserver/ {
            proxy_pass https://signserver-node:8443/signserver/;
            proxy_http_version 1.1;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header X-Forwarded-Port  $server_port;

            # Rewrite redirects SignServer sends back using its internal URL
            proxy_redirect https://signserver-node:8443/ https://$http_host/;
            proxy_redirect https://localhost/            https://localhost:8443/;

            proxy_connect_timeout 300s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_ssl_verify off;
        }

        # ════════════════════════════════════════════════════════════════════
        #  EJBCA  →  /ejbca/…
        # ════════════════════════════════════════════════════════════════════
        location /ejbca/ {
            proxy_pass         https://ejbca-node1:8443/ejbca/;
            proxy_ssl_verify   off;
            proxy_http_version 1.1;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header X-Forwarded-Port  $server_port;

            proxy_redirect https://ejbca-node1:8443/ https://$http_host/;
            proxy_redirect https://localhost/         https://localhost:8443/;
        }

        # ════════════════════════════════════════════════════════════════════
        #  Django backend (annuaire)
        # ════════════════════════════════════════════════════════════════════

        location /api/ {
            proxy_pass http://annuaire_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://annuaire_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch-all → Django
        location / {
            proxy_pass http://annuaire_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        client_max_body_size 100m;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   application/wasm image/svg+xml application/did+json
                   application/ld+json;
    }
}